name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: ruff
        run: uv run ruff check src tests scripts
      - name: mypy
        run: uv run mypy src
      - name: pytest
        run: uv run pytest -q
